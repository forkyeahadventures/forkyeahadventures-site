<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ForkYeah Adventures</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f6a63;
      color: white;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    img {
      max-width: 300px;
      width: 100%;
      border-radius: 50%;
    }

    h1 {
      margin-top: 20px;
      font-size: 32px;
    }

    .links {
      margin-top: 30px;
    }

    .links a {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 200px;
      text-decoration: none;
      color: white;
      background: #ff7a00;
      border-radius: 8px;
      font-weight: bold;
    }

    .links a:hover {
      background: #ff5500;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="FORY.png" alt="ForkYeah Adventures Logo">

    <h1>ForkYeah Adventures</h1>
    <p>Foodies with fast passes, Theme park thrills & happy hour chils 🍹</p>

    <div class="links">
      <a href="https://www.instagram.com/forkyeahadventures" target="_blank">
        Instagram
      </a>
      </div>
  </div>
</body>
</html>
